name: Drive Mirror V3R

on:
  workflow_dispatch:  # This enables the Run button once on default branch
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install rclone
        run: |
          sudo apt update
          sudo apt install -y rclone

      - name: Setup rclone config
        run: |
          mkdir -p \~/.config/rclone
          # Your base64-encoded token secret decodes here
          echo "${{ secrets.DRIVE_TOKEN }}" | base64 -d > /tmp/token.json
          cat > \~/.config/rclone/rclone.conf << 'EOF'
[gdrive]
type = drive
scope = drive
token = $(cat /tmp/token.json)
EOF
          rm /tmp/token.json

      - name: Debug config
        run: |
          rclone config file
          cat \~/.config/rclone/rclone.conf || echo "Config file not found"
          rclone listremotes || echo "No remotes found"
          rclone config show || echo "Config show failed"

      - name: Mirror V3R from Drive
        run: rclone sync gdrive:V3R . --config \~/.config/rclone/rclone.conf --delete-excluded --fast-list --progress --verbose

      - name: Commit & push changes
        run: |
          git config user.name "Auto Mirror"
          git config user.email "auto@mirror"
          git add .
          git commit -m "V3R mirror $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "No changes"
          git push
