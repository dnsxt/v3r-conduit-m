name: Drive Mirror V3R

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup rclone
        uses: AnimMouse/setup-rclone@v1
        with:
          rclone_config: ${{ secrets.RCLONE_CONFIG }}

      - name: Debug
        run: |
          rclone listremotes
          rclone config show

      - name: Mirror V3R
        run: rclone sync gdrive:V3R . --fast-list --progress --verbose --exclude ".git/**" --exclude ".github/**" --exclude "conduit/v3r-conduit-m/gdrive.json" --exclude "code/current/groq_test.py" --exclude "core/reports/handoffs/V3R Handoff Report 8 -Claude.txt" --exclude "data/AWS Services Data.txt" --exclude "data/General Data (Passwords, Login, Directories, etc.).txt" --exclude "data/System Blueprint.txt"
        
      - name: Commit & push
        run: |
          git config user.name "Auto Mirror"
          git config user.email "auto@mirror"
          git add .
          git commit -m "V3R mirror $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "No changes"
          git push
