name: CONDUIT-M Drive Mirror

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install rclone
        run: |
          sudo apt update
          sudo apt install -y rclone

      - name: Configure rclone gdrive
        run: |
          mkdir -p \~/.config/rclone
          cat > \~/.config/rclone/rclone.conf << 'EOF'
          [gdrive]
          type = drive
          scope = drive.readonly
          token = ${{ secrets.DRIVE_TOKEN }}
          EOF

      - name: Mirror full V3R tree
        run: |
          rclone sync gdrive:V3R . --delete-excluded --fast-list --progress

      - name: Commit & push
        run: |
          git config user.name "V3R CONDUIT-M"
          git config user.email "v3r@automated"
          git add .
          git commit -m "CONDUIT-M mirror $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || echo "No changes"
          git push
