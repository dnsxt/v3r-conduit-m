name: CONDUIT-M Drive Mirror

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install rclone
        run: sudo apt-get update && sudo apt-get install -y rclone

      - name: Configure rclone gdrive
        run: |
          mkdir -p \~/.config/rclone
          # Write token to temp (echo -n prevents extra newline corruption)
          echo -n '${{ secrets.DRIVE_TOKEN }}' > token.json
          # Build config file manually
          cat > \~/.config/rclone/rclone.conf << EOF
[gdrive]
type = drive
scope = drive
token = \$(cat token.json)
EOF
          # Clean up temp
          rm token.json

      - name: Debug config (verify parsing)
        run: |
          echo "Config location:"
          rclone config file
          echo "Raw config contents (token redacted):"
          sed 's/"access_token":"[^"]*"/"access_token":"REDACTED"/; s/"refresh_token":"[^"]*"/"refresh_token":"REDACTED"/' \~/.config/rclone/rclone.conf
          echo "Parsed remotes:"
          rclone listremotes
          echo "Config show output:"
          rclone config show

      - name: Mirror full V3R tree
        run: |
          rclone sync gdrive:V3R . \
            --config \~/.config/rclone/rclone.conf \
            --delete-excluded --fast-list --progress --verbose

      - name: Commit and push
        run: |
          git config user.name "V3R CONDUIT-M"
          git config user.email "v3r@automated"
          git add .
          git commit -m "CONDUIT-M mirror $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || echo "No changes"
          git push
