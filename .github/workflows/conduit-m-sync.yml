name: CONDUIT-M Drive Mirror

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install rclone
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone

      - name: Configure rclone gdrive
        run: |
          mkdir -p \~/.config/rclone
          # Echo token to file first (strips extras), then build conf
          echo -n '${{ secrets.DRIVE_TOKEN }}' > /tmp/token.json
          cat > \~/.config/rclone/rclone.conf << 'EOF'
[gdrive]
type = drive
scope = drive
token = EOF
          cat /tmp/token.json >> \~/.config/rclone/rclone.conf
          echo >> \~/.config/rclone/rclone.conf  # Ensure clean end
          rm -f /tmp/token.json

      - name: Debug config thoroughly
        run: |
          echo "Config file location:"
          rclone config file
          echo "Full config contents (secrets redacted in logs):"
          cat \~/.config/rclone/rclone.conf | sed 's/"access_token":"[^"]*"/"access_token":"REDACTED"/' | sed 's/"refresh_token":"[^"]*"/"refresh_token":"REDACTED"/'
          echo "Parsed remotes:"
          rclone listremotes
          echo "Config show:"
          rclone config show

      - name: Mirror full V3R tree
        run: rclone sync gdrive:V3R . --config \~/.config/rclone/rclone.conf --delete-excluded --fast-list --progress --verbose

      - name: Commit and push
        run: |
          git config user.name "V3R CONDUIT-M"
          git config user.email "v3r@automated"
          git add .
          git commit -m "CONDUIT-M mirror $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || echo "No changes"
          git push
