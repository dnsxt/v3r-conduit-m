name: CONDUIT-M Drive Mirror

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install rclone
        run: sudo apt-get update && sudo apt-get install -y rclone

      - name: Configure rclone gdrive safely
        run: |
          mkdir -p \~/.config/rclone
          # Write secret to temp file with NO extra newline
          echo -n '${{ secrets.DRIVE_TOKEN }}' > /tmp/drive_token.json
          # Create remote using the JSON file directly
          rclone config create gdrive drive \
            token "$(cat /tmp/drive_token.json)" \
            scope drive \
            --config \~/.config/rclone/rclone.conf
          rm -f /tmp/drive_token.json

      - name: Debug config (must show gdrive remote)
        run: |
          rclone config file
          cat \~/.config/rclone/rclone.conf || echo "Config file missing!"
          rclone listremotes --config \~/.config/rclone/rclone.conf
          rclone config show --config \~/.config/rclone/rclone.conf

      - name: Mirror full V3R tree
        run: rclone sync gdrive:V3R . \
          --config \~/.config/rclone/rclone.conf \
          --delete-excluded --fast-list --progress --verbose

      - name: Commit and push
        run: |
          git config user.name "V3R CONDUIT-M"
          git config user.email "v3r@automated"
          git add .
          git commit -m "CONDUIT-M mirror $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || echo "No changes"
          git push
